name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valac meson ninja-build gcc pkg-config \
            libglib2.0-dev libjson-glib-dev

      - name: Build
        run: |
          meson setup build
          meson compile -C build

      - name: Test
        run: meson test -C build
